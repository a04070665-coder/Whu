<!DOCTYPE html>
<html>
<head>
<title>Passport Photo Maker</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin-top:40px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
width:340px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

canvas{
margin-top:20px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
margin-top:10px;
background:#007bff;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>
</head>

<body>

<div class="container">
<h2>Passport Photo Maker</h2>

<input type="file" id="imageInput">
<br><br>

<button onclick="removeBG()">Remove Background</button>
<br>

<canvas id="canvas" width="300" height="400"></canvas>
<br>

<button onclick="downloadPhoto()">Download Photo</button>
</div>

<script src="script.js"></script>

</body>
</html>
